<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloxflip Multi-Comptes</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh; color: #fff; padding: 20px;
        }
        .container { max-width: 860px; margin: 0 auto; }

        .tabs {
            display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap;
        }
        .tab {
            padding: 10px 18px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.05); color: #888; cursor: pointer;
            font-size: 13px; transition: 0.2s; user-select: none;
        }
        .tab:hover { background: rgba(255,255,255,0.1); }
        .tab.active { background: rgba(108,99,255,0.3); border-color: #6c63ff; color: #fff; }
        .tab .badge {
            display: inline-block; margin-left: 6px; font-size: 11px;
            background: rgba(255,255,255,0.1); padding: 1px 7px; border-radius: 10px;
        }
        .add-tab {
            padding: 10px 14px; border-radius: 10px; border: 1px dashed rgba(255,255,255,0.2);
            background: transparent; color: #6c63ff; cursor: pointer; font-size: 20px; line-height: 1;
            transition: 0.2s;
        }
        .add-tab:hover { background: rgba(108,99,255,0.1); border-color: #6c63ff; }

        .panel { display: none; }
        .panel.active { display: block; }

        .card {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px; padding: 20px; margin-bottom: 16px;
        }
        .card h2 { font-size: 16px; margin-bottom: 12px; }

        .token-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        .token-inputs .full { grid-column: 1 / -1; }
        .token-inputs label { display: block; font-size: 11px; color: #888; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        .token-inputs input {
            width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.15);
            background: rgba(0,0,0,0.3); color: #fff; font-size: 13px; font-family: monospace;
            outline: none; transition: border 0.2s;
        }
        .token-inputs input:focus { border-color: #6c63ff; }
        .token-inputs input.saved { border-color: #10b981; }

        .btn-connect {
            padding: 10px 20px; border: none; border-radius: 8px;
            background: linear-gradient(135deg, #6c63ff, #e040fb);
            color: #fff; font-weight: 600; cursor: pointer; font-size: 13px; transition: 0.2s;
        }
        .btn-connect:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(108,99,255,0.4); }
        .btn-connect:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .btn-danger {
            padding: 8px 14px; border: 1px solid rgba(255,107,107,0.3); border-radius: 8px;
            background: rgba(255,107,107,0.1); color: #ff6b6b; cursor: pointer; font-size: 12px; transition: 0.2s;
        }
        .btn-danger:hover { background: rgba(255,107,107,0.2); }

        .balances {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 10px; margin-bottom: 12px;
        }
        .balance-item {
            background: rgba(255,255,255,0.03); border-radius: 10px; padding: 14px; text-align: center;
        }
        .balance-item .label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
        .balance-item .value { font-size: 20px; font-weight: 700; margin-top: 4px; }
        .balance-item .value.rocoins { color: #f59e0b; }
        .balance-item .value.flipcoins { color: #10b981; }
        .balance-item .value.coins { color: #3b82f6; }
        .balance-item .value.xp { color: #8b5cf6; }
        .balance-item .value.keys { color: #ef4444; }

        .tip-form { display: flex; gap: 10px; flex-wrap: wrap; align-items: end; }
        .tip-form .field { flex: 1; min-width: 120px; }
        .tip-form .field label { display: block; font-size: 11px; color: #888; margin-bottom: 3px; }
        .tip-form .field input, .tip-form .field select {
            width: 100%; padding: 8px 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.15);
            background: rgba(0,0,0,0.3); color: #fff; font-size: 13px; outline: none;
        }
        .tip-form .field select option { background: #1a1a2e; }
        .btn-tip {
            padding: 8px 18px; border: none; border-radius: 6px;
            background: linear-gradient(135deg, #6c63ff, #e040fb);
            color: #fff; font-weight: 600; cursor: pointer; font-size: 13px; transition: 0.2s;
        }
        .btn-tip:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(108,99,255,0.4); }
        .btn-tip:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .result-box {
            margin-top: 10px; padding: 10px; border-radius: 6px;
            background: rgba(0,0,0,0.3); font-family: monospace; font-size: 12px;
            white-space: pre-wrap; word-break: break-all; display: none;
        }
        .result-box.success { border-left: 3px solid #10b981; display: block; }
        .result-box.error { border-left: 3px solid #ef4444; display: block; }

        .loading-msg { text-align: center; padding: 20px; color: #666; font-size: 14px; }
        .account-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;
        }
        .account-header .name { font-weight: 600; font-size: 15px; }
        .status-dot {
            display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px;
        }
        .status-dot.online { background: #10b981; }
        .status-dot.offline { background: #ef4444; }

        @media (max-width: 600px) {
            .token-inputs { grid-template-columns: 1fr; }
            .tip-form { flex-direction: column; }
            .tip-form .field { min-width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="margin-bottom: 20px; font-size: 20px;">🎮 Bloxflip Multi-Comptes</h1>

        <div class="tabs" id="tabs"></div>

        <div id="panels"></div>
    </div>

    <script>
        // === TON PROXY CLOUDFLARE WORKER ===
        const CORS_PROXY = 'https://misty-flower-542b.noahvigneron14.workers.dev/?url=';

        // === STOCKAGE ===
        function getAccounts() {
            try { return JSON.parse(localStorage.getItem('bf_accounts')) || []; }
            catch { return []; }
        }
        function saveAccounts(accounts) {
            localStorage.setItem('bf_accounts', JSON.stringify(accounts));
        }

        let accounts = getAccounts();
        let activeIndex = -1;
        let balancesCache = {};

        // === FONCTIONS API AVEC TON PROXY ===
        async function getBalance(rt) {
            const target = 'https://bloxflip.com/api/user';
            const res = await fetch(CORS_PROXY + encodeURIComponent(target), {
                headers: {
                    'Accept': 'application/json',
                    'x-auth-token': rt
                }
            });
            if (!res.ok) throw new Error(`API ${res.status}`);
            const data = await res.json();
            return {
                rocoins: data.wallet?.balances?.ROCOINS ?? 0,
                flipcoins: data.wallet?.balances?.FLIPCOINS ?? 0,
                coins: data.wallet?.balances?.COINS ?? 0,
                xp: data.wallet?.balances?.XP ?? 0,
                keys: data.wallet?.balances?.KEYS ?? 0
            };
        }

        async function sendTip(rt, recipient, amount, currency) {
            const target = 'https://bloxflip.com/api/chat/commands/gift';
            const res = await fetch(CORS_PROXY + encodeURIComponent(target), {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-currency': currency,
                    'x-auth-token': rt
                },
                body: JSON.stringify({
                    recipientUsername: recipient,
                    amount: parseFloat(amount),
                    captcha_token: ""
                })
            });
            return await res.json();
        }

        // === RENDU ===
        function render() {
            const tabsContainer = document.getElementById('tabs');
            const panelsContainer = document.getElementById('panels');

            if (accounts.length === 0) {
                tabsContainer.innerHTML = '';
                panelsContainer.innerHTML = `
                    <div class="card" style="text-align:center; padding:40px;">
                        <p style="color:#666; margin-bottom:16px;">Aucun compte ajouté.</p>
                        <p style="color:#888; font-size:13px;">Clique sur <strong>+</strong> pour ajouter un compte.</p>
                    </div>
                `;
                return;
            }

            if (activeIndex < 0 || activeIndex >= accounts.length) activeIndex = 0;

            // Onglets
            tabsContainer.innerHTML = accounts.map((acc, i) => {
                const isActive = i === activeIndex;
                const name = acc.name || `Compte ${i + 1}`;
                return `<div class="tab ${isActive ? 'active' : ''}" onclick="switchAccount(${i})">
                    ${name}${acc.connected ? ' ✅' : ''}
                    <span class="badge">${i + 1}</span>
                </div>`;
            }).join('') + `<div class="add-tab" onclick="addAccount()" title="Ajouter un compte">+</div>`;

            // Panneaux
            panelsContainer.innerHTML = accounts.map((acc, i) => {
                const isActive = i === activeIndex;
                const bal = balancesCache[i] || null;
                const loading = acc.loading || false;
                const name = acc.name || `Compte ${i + 1}`;

                return `
                <div class="panel ${isActive ? 'active' : ''}" data-index="${i}">
                    <div class="card">
                        <div class="account-header">
                            <div>
                                <span class="status-dot ${acc.connected ? 'online' : 'offline'}"></span>
                                <span class="name">${acc.connected ? '✅ Connecté' : '🔌 Non connecté'}</span>
                            </div>
                            <button class="btn-danger" onclick="removeAccount(${i})">🗑 Supprimer</button>
                        </div>

                        <div class="token-inputs">
                            <div>
                                <label>Token app.rt</label>
                                <input type="password" id="rt_${i}" value="${acc.rt || ''}" placeholder="..." class="${acc.rt ? 'saved' : ''}">
                            </div>
                            <div>
                                <label>Token app.at</label>
                                <input type="password" id="at_${i}" value="${acc.at || ''}" placeholder="..." class="${acc.at ? 'saved' : ''}">
                            </div>
                            <div class="full" style="display:flex; gap:8px; align-items:end;">
                                <div style="flex:2;">
                                    <label>Surnom (optionnel)</label>
                                    <input type="text" id="nick_${i}" value="${acc.name || ''}" placeholder="Mon compte principal" style="font-family:inherit;">
                                </div>
                                <button class="btn-connect" onclick="connectAccount(${i})" id="connectBtn_${i}">
                                    ${acc.connected ? '🔄 Reconnecter' : '🔗 Se connecter'}
                                </button>
                            </div>
                        </div>
                    </div>

                    <div id="balances_${i}">
                        ${loading ? '<div class="loading-msg">⏳ Chargement...</div>' : ''}
                        ${bal && !loading ? `
                        <div class="card">
                            <h2>💰 Soldes</h2>
                            <div class="balances">
                                <div class="balance-item"><div class="label">ROCOINS</div><div class="value rocoins">${Number(bal.rocoins).toLocaleString()}</div></div>
                                <div class="balance-item"><div class="label">FLIPCOINS</div><div class="value flipcoins">${Number(bal.flipcoins).toLocaleString()}</div></div>
                                <div class="balance-item"><div class="label">COINS</div><div class="value coins">${Number(bal.coins).toLocaleString()}</div></div>
                                <div class="balance-item"><div class="label">XP</div><div class="value xp">${Number(bal.xp).toLocaleString()}</div></div>
                                <div class="balance-item"><div class="label">KEYS</div><div class="value keys">${Number(bal.keys).toLocaleString()}</div></div>
                            </div>
                        </div>
                        ` : ''}
                        ${!acc.connected && !loading ? '<div class="card" style="text-align:center;color:#666;padding:20px;">Connecte le compte pour voir les soldes.</div>' : ''}
                    </div>

                    ${acc.connected ? `
                    <div class="card">
                        <h2>💸 Envoyer un Tip</h2>
                        <div class="tip-form">
                            <div class="field">
                                <label>Destinataire</label>
                                <input type="text" id="tip_recipient_${i}" placeholder="username">
                            </div>
                            <div class="field">
                                <label>Montant</label>
                                <input type="number" id="tip_amount_${i}" placeholder="0" step="any" min="0">
                            </div>
                            <div class="field">
                                <label>Devise</label>
                                <select id="tip_currency_${i}">
                                    <option value="ROCOINS">ROCOINS</option>
                                    <option value="FLIPCOINS">FLIPCOINS</option>
                                    <option value="COINS">COINS</option>
                                </select>
                            </div>
                            <button class="btn-tip" onclick="doTip(${i})">Envoyer</button>
                        </div>
                        <div id="tipResult_${i}" class="result-box"></div>
                    </div>
                    ` : ''}
                </div>`;
            }).join('');
        }

        // === ACTIONS ===
        function addAccount() {
            accounts.push({ rt: '', at: '', name: '', connected: false, loading: false });
            saveAccounts(accounts);
            activeIndex = accounts.length - 1;
            render();
            setTimeout(() => {
                const panel = document.querySelector(`.panel[data-index="${activeIndex}"]`);
                if (panel) {
                    const input = panel.querySelector('input[type="password"]');
                    if (input) input.focus();
                }
            }, 100);
        }

        function removeAccount(index) {
            if (!confirm(`Supprimer le compte "${accounts[index]?.name || `Compte ${index + 1}`}" ?`)) return;
            accounts.splice(index, 1);
            delete balancesCache[index];
            const newCache = {};
            Object.keys(balancesCache).forEach(k => {
                const oldIdx = parseInt(k);
                if (oldIdx < index) newCache[oldIdx] = balancesCache[k];
                else if (oldIdx > index) newCache[oldIdx - 1] = balancesCache[k];
            });
            balancesCache = newCache;
            if (activeIndex >= accounts.length) activeIndex = accounts.length - 1;
            if (activeIndex === index) activeIndex = Math.max(0, index - 1);
            saveAccounts(accounts);
            render();
        }

        function switchAccount(index) {
            activeIndex = index;
            render();
        }

        async function connectAccount(index) {
            const rt = document.getElementById(`rt_${index}`).value.trim();
            const at = document.getElementById(`at_${index}`).value.trim();
            const nick = document.getElementById(`nick_${index}`).value.trim();

            if (!rt || !at) {
                alert('Les deux tokens sont requis.');
                return;
            }

            const btn = document.getElementById(`connectBtn_${index}`);
            btn.disabled = true;
            btn.textContent = '⏳ Connexion...';
            accounts[index].loading = true;
            saveAccounts(accounts);
            render();

            try {
                const balance = await getBalance(rt);
                accounts[index].rt = rt;
                accounts[index].at = at;
                accounts[index].name = nick || `Compte ${index + 1}`;
                accounts[index].connected = true;
                accounts[index].loading = false;
                balancesCache[index] = balance;
                saveAccounts(accounts);
                render();
            } catch (err) {
                accounts[index].loading = false;
                accounts[index].connected = false;
                saveAccounts(accounts);
                render();
                alert('❌ Erreur de connexion : ' + err.message);
            }
        }

        async function doTip(index) {
            const rt = accounts[index].rt;
            const recipient = document.getElementById(`tip_recipient_${index}`).value.trim();
            const amount = document.getElementById(`tip_amount_${index}`).value.trim();
            const currency = document.getElementById(`tip_currency_${index}`).value;
            const resultDiv = document.getElementById(`tipResult_${index}`);

            if (!recipient) return showTipResult(index, "Nom d'utilisateur requis.", 'error');
            if (!amount || parseFloat(amount) <= 0) return showTipResult(index, 'Montant invalide.', 'error');

            const btn = resultDiv.parentElement.querySelector('.btn-tip');
            btn.disabled = true;
            btn.textContent = '⏳...';

            try {
                const result = await sendTip(rt, recipient, amount, currency);
                showTipResult(index, JSON.stringify(result, null, 2), result.success ? 'success' : 'error');
                refreshBalances(index);
            } catch (err) {
                showTipResult(index, 'Erreur: ' + err.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Envoyer';
            }
        }

        async function refreshBalances(index) {
            const rt = accounts[index].rt;
            if (!rt) return;
            try {
                const balance = await getBalance(rt);
                balancesCache[index] = balance;
                render();
            } catch {}
        }

        function showTipResult(index, msg, type) {
            const div = document.getElementById(`tipResult_${index}`);
            div.textContent = msg;
            div.className = 'result-box ' + type;
        }

        // === INIT ===
        render();
    </script>
</body>
</html>
